version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - stockflow-net

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stockflow-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - stockflow-net

  # ─────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: stockflow-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - stockflow-net

  # MinIO bucket initializer
  minio-init:
    image: minio/mc:latest
    container_name: stockflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/stockflow-data &&
      mc mb --ignore-existing local/mlflow-artifacts &&
      echo 'Buckets ready'
      "
    env_file: .env
    networks:
      - stockflow-net

  # ─────────────────────────────────────────
  # MLflow
  # ─────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: stockflow-mlflow
    env_file: .env
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: >
      bash -c "pip install mlflow boto3 psycopg2-binary --quiet &&
               mlflow server
               --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
               --default-artifact-root s3://mlflow-artifacts/
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - stockflow-net

  # ─────────────────────────────────────────
  # Airflow — DB init
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: stockflow-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -r /requirements.txt --quiet
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_WWW_USER_USERNAME} \
          --password ${AIRFLOW_WWW_USER_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@stockflow.local || true

  # ─────────────────────────────────────────
  # Airflow — Webserver
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: stockflow-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Airflow — Scheduler
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: stockflow-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Airflow — Worker (Celery optional)
  # ─────────────────────────────────────────
  airflow-worker:
    <<: *airflow-common
    container_name: stockflow-airflow-worker
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # FastAPI serving
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: stockflow-api
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
    depends_on:
      - mlflow
    networks:
      - stockflow-net

volumes:
  postgres-data:
  minio-data:

networks:
  stockflow-net:
    driver: bridge
